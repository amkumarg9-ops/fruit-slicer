<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Slash - Futuristic Fruit Slicer</title>
  <!-- Cyberpunk fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/desktop.css">
  
  <!-- CDN Dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>

  <!-- Futuristic Cyber HUD -->
  <div id="hud">
    <div class="hud-top">
      <div class="brand">
        <span class="neon-text">NEON</span><span class="cyber-accent">SLASH</span>
      </div>
      <div id="connection-status" class="status-disconnected">
        <span class="status-dot"></span>
        <span class="status-text">CONTROLLER DISCONNECTED</span>
      </div>
    </div>
    
    <div class="hud-bottom">
      <div class="stat-box">
        <div class="stat-label">HIGH SCORE</div>
        <div id="high-score-val" class="stat-value">00000</div>
      </div>
    </div>
  </div>

  <!-- Game Over Screen -->
  <div id="game-over-screen" class="hidden glass-panel">
    <h1 class="neon-text-red">SYSTEM CRASH</h1>
    <h2 class="subtitle">GAME OVER</h2>
    <div class="stats-summary">
      <div class="summary-item">
        <span>SCORE:</span>
        <span id="final-score" class="cyber-accent">0</span>
      </div>
      <div class="summary-item">
        <span>MAX COMBO:</span>
        <span id="final-combo" class="cyber-accent">0x</span>
      </div>
    </div>
    <div class="controller-prompt">
      Tap <span class="cyber-accent">RESTART</span> on your controller to play again.
    </div>
  </div>

  <!-- Connect Controller Panel (Overlay before controller joins) -->
  <div id="connection-overlay" class="glass-panel">
    <div class="connection-header">
      <h1 class="neon-text">PAIR CONTROLLER</h1>
      <p class="instruction">Scan the QR code below with your phone to use it as a sword.</p>
    </div>

    <div class="qr-container">
      <div id="qrcode"></div>
      <div class="qr-glow"></div>
    </div>

    <div class="wifi-warning">
      ⚡ Make sure your phone and laptop are on the <span class="cyber-accent">SAME WIFI NETWORK</span>.
    </div>

    <div class="divider">
      <span>OR</span>
    </div>

    <button id="mouse-play-btn" class="cyber-btn">
      <span class="btn-glow"></span>
      PLAY WITH MOUSE
    </button>
  </div>

  <!-- Phaser canvas container -->
  <div id="game-container"></div>

  <!-- Client JavaScript -->
  <script src="js/sound-synth.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
